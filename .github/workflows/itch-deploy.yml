name: Deploy to itch.io

on:
  workflow_dispatch:
    inputs:
      destination:
        description: Choose which itch.io project to deploy
        required: true
        default: test
        type: choice
        options:
          - test
          - production
      userversion:
        description: Optional butler --userversion value
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      ITCH_CHANNEL: html5
      ITCH_TEST_TARGET: rainman1337/wave-pong-test
      ITCH_PRODUCTION_TARGET: rainman1337/wave-pong
      INPUT_DESTINATION: ${{ inputs.destination }}
      INPUT_USERVERSION: ${{ inputs.userversion }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build itch.io HTML artifact
        shell: bash
        run: |
          set -euo pipefail
          node tools/build-itch-html.js

      - name: Validate deploy settings
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${BUTLER_API_KEY:-}" ]]; then
            echo "Missing BUTLER_API_KEY secret." >&2
            exit 1
          fi

          if [[ -z "${ITCH_CHANNEL:-}" ]]; then
            echo "Missing ITCH_CHANNEL value." >&2
            exit 1
          fi

          if [[ ! -f "itch-build/index.html" ]]; then
            echo "Expected itch-build/index.html after the build step." >&2
            exit 1
          fi

          case "${INPUT_DESTINATION}" in
            test)
              TARGET_BASE="${ITCH_TEST_TARGET}"
              ;;
            production)
              TARGET_BASE="${ITCH_PRODUCTION_TARGET}"
              ;;
            *)
              echo "Unsupported destination: ${INPUT_DESTINATION}" >&2
              exit 1
              ;;
          esac

          echo "TARGET_BASE=${TARGET_BASE}" >> "${GITHUB_ENV}"

      - name: Install butler
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default -o butler.zip
          unzip -q butler.zip -d butler-bin
          chmod +x butler-bin/butler
          echo "${PWD}/butler-bin" >> "${GITHUB_PATH}"

      - name: Push build
        shell: bash
        run: |
          set -euo pipefail

          USER_VERSION="${INPUT_USERVERSION}"
          if [[ -z "${USER_VERSION}" ]]; then
            USER_VERSION="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          fi

          TARGET="${TARGET_BASE}:${ITCH_CHANNEL}"
          echo "Pushing itch-build to ${TARGET} with version ${USER_VERSION}"
          butler push "itch-build" "${TARGET}" --userversion "${USER_VERSION}"
